<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="noindex"><title>Fleetch — Accès protégé</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1565C0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.lock-card{background:#fff;border-radius:18px;max-width:380px;width:100%;padding:34px 28px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.25)}
.lock-ic{width:56px;height:56px;border-radius:50%;background:#E3EFFE;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}.lock-ic i{font-size:26px;color:#1565C0}
.lock-card h1{font-size:20px;font-weight:500;color:#1A1F2B}.lock-card p{font-size:13px;color:#6B7280;margin-top:8px;line-height:1.5}
form{margin-top:22px;display:flex;flex-direction:column;gap:10px}
input{width:100%;padding:13px 14px;font-size:15px;border:.5px solid #E0E3E8;border-radius:10px;font-family:inherit;background:#F5F6F8}
input:focus{outline:none;border-color:#1565C0;background:#fff}
button{width:100%;padding:13px;font-size:15px;font-weight:500;color:#fff;background:#1565C0;border:none;border-radius:10px;cursor:pointer;font-family:inherit}
button:disabled{opacity:.6;cursor:wait}
#err{display:none;font-size:13px;color:#C62828;margin-top:4px}
.foot{font-size:11px;color:#9299A5;margin-top:18px}
</style></head><body>
<div class="lock-card">
<div class="lock-ic"><i class="ti ti-lock"></i></div>
<h1>Accès protégé</h1>
<p>Prototype Fleetch Driver App &mdash; réservé à l'équipe. Entre le mot de passe pour continuer.</p>
<form id="f"><input id="pw" type="password" placeholder="Mot de passe" autocomplete="current-password" autofocus><button id="b" type="submit">Déverrouiller</button><div id="err">Mot de passe incorrect.</div></form>
<div class="foot">Fleetch &middot; document interne</div>
</div>
